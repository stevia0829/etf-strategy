# Multi-Agent ETF 策略分析框架配置

# ETF 池子（JoinQuant 代码格式）
etf_pools:
  # 策略2 ETF反弹池（优先级从高到低）
  rebound:
    - code: "159915.XSHE"
      name: "创业板ETF"
    - code: "159536.XSHE"
      name: "中证2000"
    - code: "159629.XSHE"
      name: "中证1000"
    - code: "159922.XSHE"
      name: "中证500"
    - code: "159919.XSHE"
      name: "沪深300"
    - code: "159783.XSHE"
      name: "双创50"

  # 策略3 ETF轮动池
  rotation:
    - code: "518880.XSHG"
      name: "黄金ETF"
    - code: "161226.XSHE"
      name: "白银基金"
    - code: "501018.XSHG"
      name: "南方原油"
    - code: "159985.XSHE"
      name: "豆粕ETF"
    - code: "513520.XSHG"
      name: "日经ETF"
    - code: "513100.XSHG"
      name: "纳指100"
    - code: "513300.XSHG"
      name: "纳斯达克ETF"
    - code: "513400.XSHG"
      name: "道琼斯ETF"
    - code: "513030.XSHG"
      name: "德国30"
    - code: "513130.XSHG"
      name: "恒生科技ETF"
    - code: "512480.XSHG"
      name: "半导体"
    - code: "512760.XSHG"
      name: "存储芯片"
    - code: "515880.XSHG"
      name: "通信ETF"
    - code: "515230.XSHG"
      name: "软件ETF"
    - code: "515050.XSHG"
      name: "5GETF"
    - code: "159819.XSHE"
      name: "人工智能"
    - code: "562500.XSHG"
      name: "机器人"

# 策略参数
strategy:
  momentum_days: 21          # 动量计算天数
  max_score: 6.0             # 动量得分高阈值
  min_score: 0.0             # 动量得分低阈值
  score_threshold_multiplier: 1.1  # 高分衰减检测
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  rsi_period: 14
  bounce_lookback_days: 5    # 反弹信号回看天数
  bounce_drop_threshold: 0.98    # 开盘价/近期高点 < 此值视为下跌
  bounce_recover_threshold: 1.01 # 当前价/开盘价 > 此值视为反弹

# 市场指数（用于大盘参考）
market_indices:
  - code: "000300.XSHG"
    name: "沪深300"
  - code: "399101.XSHE"
    name: "中证1000"
  - code: "159536.XSHE"
    name: "中证2000ETF"

# LLM 配置
llm:
  provider: "openai"           # openai 或 anthropic
  model: "gpt-4o-mini"        # 或 claude-sonnet-4-5-20250514
  temperature: 0.1
  max_tokens: 2000

# 新闻源配置
news:
  akshare_limit: 20            # AKShare 新闻条数
  enable_web_search: true      # 是否启用网络搜索
  search_provider: "duckduckgo" # duckduckgo 或 tavily
  geopolitical_queries:
    - "中美贸易 最新消息"
    - "国际政治 风险 金融市场"
    - "A股 市场政策 最新"
  sector_keywords:
    "黄金": ["黄金", "贵金属", "金价的"]
    "原油": ["原油", "石油", "OPEC"]
    "半导体": ["芯片", "半导体", "美国制裁"]
    "科技": ["AI", "人工智能", "科技"]
    "医药": ["医药", "创新药", "医疗"]

# 推送配置
notification:
  enabled: true
  wechat_webhook: ""           # 企业微信 Webhook URL（需填入）
  dingtalk_webhook: ""         # 钉钉 Webhook URL（需填入）
  dingtalk_secret: ""          # 钉钉签名密钥（可选）

# 数据源配置
data_source:
  priority: ["akshare", "baostock", "tushare"]
  tushare_token_file: "config.json"  # 相对于 etf_strategy 目录
  price_lookback_days: 60     # 默认获取的历史天数
